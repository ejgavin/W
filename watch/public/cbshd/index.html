<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <!-- Video.js CSS -->
    <link href="https://unpkg.com/video.js/dist/video-js.css" rel="stylesheet">
    <!-- Load Video.js Script Properly -->
    <script src="https://unpkg.com/video.js/dist/video.js" defer></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        #iptv-player {
            width: 100%;
            max-width: 100vw;
            height: 80vh;
            max-height: 80vh;
        }
    </style>
</head>
<body>
    <!-- Video.js player setup -->
    <video id="iptv-player" class="video-js vjs-default-skin" controls autoplay data-setup='{}'>
        <source src="https://cbsplaylistserver.aws.syncbak.com/mpl/20160401/17761229/5743360/media.m3u8?request_token=aY2nDtUD3MS29E4Ey-aLOdeeDDkKOwdpiFGQzk7Si6DKsmGf9YaoAcZGCIPH7h2oNGC8q6WPxfYn3H_oNydDAiq3hniScCRKNJYxmaEKD-skTAg4DH-PggkGiZRlTlMriaKLHlkLVf1yW-kehkLByiLmrrZiDNph7gfPN_2qnJIhx9AdqSAv4wNaiBEvzi7b&CMCD=mtp%3D159800%2Cot%3Dm%2Csf%3Dh%2Csid%3D%220bc594e0-ffec-482a-acb5-a3130dbf0673%22" type="application/x-mpegURL">
        <!-- Fallback message for unsupported browsers -->
        Your browser does not support HTML5 video.
    </video>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var player = videojs('iptv-player', {
                controls: true,
                autoplay: true,
                fluid: true,
                preload: 'auto',
                responsive: true
            });

            // Handling errors (e.g., stream not loading)
            player.on('error', function() {
                console.error('Error: Unable to load the stream.');
                alert('There was an error loading the IPTV stream.');
            });
        });
    </script>
</body>
</html>
